<!DOCTYPE html>
<!-- เปิดไฟล์นี้ในเบราว์เซอร์แล้วกดปุ่มเพื่อสร้างไอคอน PNG -->
<html><head><meta charset="UTF-8"/><title>Generate Icons</title></head>
<body style="font-family:sans-serif;padding:24px;">
<h2>🏭 สร้างไอคอน PWA</h2>
<p>กดปุ่มด้านล่างเพื่อดาวน์โหลดไอคอน แล้วนำไปวางในโฟลเดอร์ <code>icons/</code></p>
<button onclick="gen(192)" style="padding:10px 20px;margin:8px;font-size:1rem;cursor:pointer;">⬇️ icon-192.png</button>
<button onclick="gen(512)" style="padding:10px 20px;margin:8px;font-size:1rem;cursor:pointer;">⬇️ icon-512.png</button>
<br/><canvas id="c" style="margin-top:16px;border:1px solid #ccc;"></canvas>
<script>
function gen(size) {
  const canvas = document.getElementById('c');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  // background
  const r = size * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#1a365d';
  ctx.fill();
  // emoji
  ctx.font = `${size * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏭', size / 2, size / 2 + size * 0.04);
  // download
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
</body></html>
